buildscript {
    ext.kotlin_version = '1.9.24'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.3.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Bazı eski Flutter eklentileri (ör. speech_to_text) kendi build.gradle
// dosyalarında bu değerleri rootProject.ext üzerinden okumaya çalışır.
// Yeni Flutter şablonunda bu artık otomatik tanımlanmadığı için elle
// ekliyoruz - aksi halde "compileSdkVersion is not specified" hatası alınır.
ext {
    compileSdkVersion = 34
    minSdkVersion = 23
    targetSdkVersion = 34
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
